name: test

on:
  push:
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

  package:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel
      - name: Install wheel and smoke-test CLI
        shell: bash
        run: |
          python -m venv .venv-package-smoke
          source .venv-package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          loopback-litmus --help
          python -c "import loopback_litmus"
